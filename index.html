<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>You Are An Idiot! (Safe Recreation)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    background:black;
}

#text{
    position:absolute;
    font-size:72px;
    font-weight:bold;
    text-align:center;
    white-space:nowrap;
    text-shadow:
        4px 4px black,
        -4px -4px black,
        4px -4px black,
        -4px 4px black;
    animation:pulse .18s infinite alternate;
}

#faces{
    font-size:64px;
}

#status{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    color:white;
    font-size:15px;
    font-weight:bold;
    text-shadow:1px 1px black;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.07);
    }
}
</style>
</head>
<body>

<div id="text">
    YOU ARE AN IDIOT!<br>
    <span id="faces">😀 😀 😀</span>
</div>

<div id="status">
    Click anywhere to start the music.
</div>

<script>

/* ===========================================================
   👇👇👇 GRANDMA-PROOF SETUP 👇👇👇

   Replace EVERYTHING between the quotes below
   with the URL to your MP3.

   Example:

   const AUDIO_URL = "https://prank12345678.github.io/idiot.mp3";

   OR (recommended if the MP3 is in the same folder)

   const AUDIO_URL = "./idiot.mp3";

   =========================================================== */

const AUDIO_URL = "PUT YOUR MP3 URL HERE";

/* =========================================================== */

const audio = new Audio(AUDIO_URL);
audio.loop = true;
audio.preload = "auto";

const colors = [
"#ff0000",
"#00ff00",
"#0000ff",
"#ffff00",
"#ff00ff",
"#00ffff",
"#ffffff"
];

const text = document.getElementById("text");

let x = 120;
let y = 100;

let dx = 7;
let dy = 5;

let running = true;

function randomColor(){
    return colors[Math.floor(Math.random()*colors.length)];
}

function animate(){

    if(!running) return;

    x += dx;
    y += dy;

    if(x <= 0 || x + text.offsetWidth >= window.innerWidth){
        dx *= -1;
    }

    if(y <= 0 || y + text.offsetHeight >= window.innerHeight){
        dy *= -1;
    }

    text.style.left = x + "px";
    text.style.top = y + "px";

    requestAnimationFrame(animate);
}

animate();

setInterval(()=>{

    if(!running) return;

    document.body.style.background = randomColor();
    text.style.color = randomColor();

},100);

async function startAudio(){

    try{

        if(
            AUDIO_URL === "" ||
            AUDIO_URL === "./idiot.mp3"
        ){
            document.getElementById("status").innerHTML =
                "⚠️ Edit index.html and replace <b>PUT YOUR MP3 URL HERE</b> with your MP3 URL.";
            return;
        }

        await audio.play();

        document.getElementById("status").innerHTML =
            "🎵 Music playing! Press ESC to stop.";

    }catch(err){

        document.getElementById("status").innerHTML =
            "Couldn't play the audio. Check your MP3 URL.";

        console.log(err);

    }

}

document.addEventListener("click",startAudio,{once:true});
document.addEventListener("keydown",startAudio,{once:true});

document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        running=false;

        audio.pause();

        document.body.style.background="black";

        text.style.left="50%";
        text.style.top="50%";
        text.style.transform="translate(-50%,-50%)";

        document.getElementById("status").innerHTML =
            "Stopped.";

    }

});

window.addEventListener("resize",()=>{

    x=Math.min(x,window.innerWidth-text.offsetWidth);
    y=Math.min(y,window.innerHeight-text.offsetHeight);

});

</script>

</body>
</html>
