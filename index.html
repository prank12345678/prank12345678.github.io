<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are An Idiot (Safe Recreation)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
}

#msg{
    position:absolute;
    font-size:72px;
    font-weight:bold;
    text-align:center;
    white-space:nowrap;
    text-shadow:
        4px 4px #000,
        -4px -4px #000,
        4px -4px #000,
        -4px 4px #000;
}

#smile{
    font-size:72px;
}

#footer{
    position:fixed;
    bottom:10px;
    left:0;
    width:100%;
    text-align:center;
    color:white;
    font-size:14px;
    opacity:.75;
}

.flash{
    animation:flash .18s infinite alternate;
}

@keyframes flash{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.05);
    }
}
</style>
</head>
<body>

<div id="msg" class="flash">
    YOU ARE AN IDIOT<br>
    <span id="smile">😀 😀 😀</span>
</div>

<div id="footer">
    Safe recreation • Press Esc to stop animation
</div>

<script>
const colors = [
"#ff0000",
"#00ff00",
"#ffff00",
"#00ffff",
"#ff00ff",
"#ffffff",
"#0000ff"
];

const text = document.getElementById("msg");

let x = 100;
let y = 100;

let dx = 6;
let dy = 5;

let running = true;

function randomColor(){
    return colors[Math.floor(Math.random()*colors.length)];
}

function animate(){

    if(!running) return;

    x += dx;
    y += dy;

    if(x <= 0 || x + text.offsetWidth >= innerWidth)
        dx *= -1;

    if(y <= 0 || y + text.offsetHeight >= innerHeight)
        dy *= -1;

    text.style.left = x + "px";
    text.style.top = y + "px";

    document.body.style.background = randomColor();
    text.style.color = randomColor();

    requestAnimationFrame(animate);
}

animate();

setInterval(()=>{
    if(!running) return;

    document.body.style.background = randomColor();
    text.style.color = randomColor();

    if(Math.random() > .7){
        document.body.style.transform =
            `rotate(${(Math.random()-.5)*2}deg)`;
    }else{
        document.body.style.transform = "rotate(0deg)";
    }

},120);

document.addEventListener("keydown",e=>{
    if(e.key==="Escape"){
        running=false;
        document.body.style.background="#000";
        document.body.style.transform="none";
        text.style.left="50%";
        text.style.top="50%";
        text.style.transform="translate(-50%,-50%)";
        document.getElementById("footer").innerHTML="Animation stopped.";
    }
});

window.addEventListener("resize",()=>{
    x=Math.min(x,innerWidth-text.offsetWidth);
    y=Math.min(y,innerHeight-text.offsetHeight);
});
</script>

</body>
</html>
